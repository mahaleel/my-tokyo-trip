*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;min-height:100vh}
.header{background:#D0021B;color:#fff;padding:16px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.85;margin-top:2px}
.nav{display:flex;overflow-x:auto;gap:4px;padding:10px 12px;background:#fff;border-bottom:1px solid #eee;scrollbar-width:none;position:sticky;top:60px;z-index:99}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;color:#666}
.nav-btn.active{background:#D0021B;color:#fff;border-color:#D0021B;font-weight:600}
.content{padding:12px}
.day-nav{display:flex;overflow-x:auto;gap:6px;margin-bottom:12px;padding-bottom:4px;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{flex-shrink:0;padding:8px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;white-space:nowrap;color:#666}
.day-btn.active{background:#D0021B;color:#fff;border-color:#D0021B;font-weight:600}
.day-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:12px;background:#fff;border-radius:12px;border-left:4px solid #D0021B}
.day-badge{background:#D0021B;color:#fff;border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;flex-shrink:0}
.day-title{font-size:14px;font-weight:600;color:#111;line-height:1.3}
.day-sub{font-size:11px;color:#888;margin-top:2px}
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#eee}
.tl-item{position:relative;margin-bottom:10px}
.tl-item::before{content:'';position:absolute;left:-22px;top:8px;width:8px;height:8px;border-radius:50%;background:#D0021B;border:2px solid #f5f5f5;box-shadow:0 0 0 1.5px #D0021B}
.tl-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 12px;cursor:pointer}
.tl-card:active{background:#fafafa}
.tl-time{font-size:11px;color:#D0021B;font-weight:600;margin-bottom:3px}
.tl-act{font-size:14px;font-weight:600;color:#111}
.tl-transport{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#888;background:#f5f5f5;padding:3px 8px;border-radius:10px;margin-top:6px}
.tl-note{font-size:12px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0;display:none;line-height:1.5}
.tl-note.open{display:block}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.6px;margin:16px 0 8px}
.tip-card{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:8px;border-left:3px solid #D0021B}
.tip-title{font-size:13px;font-weight:600;color:#111;margin-bottom:4px}
.tip-text{font-size:12px;color:#555;line-height:1.5}
.vibe-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.vibe-item{background:#fff;border-radius:10px;padding:10px}
.vibe-k{font-size:10px;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.vibe-v{font-size:12px;color:#111;font-weight:600}
.tab-row{display:flex;gap:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:8px 4px;border-radius:10px;border:1px solid #eee;background:#fff;font-size:12px;cursor:pointer;color:#888}
.tab-btn.active{background:#D0021B;color:#fff;border-color:#D0021B;font-weight:600}
.tab-content{display:none}
.tab-content.active{display:block}
.food-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:10px}
.food-name{font-size:14px;font-weight:600;color:#111}
.food-area{font-size:11px;color:#D0021B;margin-top:2px}
.food-desc{font-size:12px;color:#555;margin-top:6px;line-height:1.5}
.food-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.food-tag{font-size:11px;background:#f5f5f5;border:1px solid #eee;border-radius:10px;padding:3px 8px;color:#666}
.konbini-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.k-store{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0;margin-top:2px}
.k-store.fm{background:#e8f4e8;color:#2a6e2a}
.k-store.seven{background:#fff3e0;color:#c65500}
.k-store.lawson{background:#e3eeff;color:#1a4fa0}
.k-store.any{background:#f5f5f5;color:#666}
.k-item{font-size:13px;font-weight:600;color:#111}
.k-why{font-size:12px;color:#666;margin-top:3px;line-height:1.4}
.note-section{margin-bottom:16px}
.note-sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.note-cat{font-size:11px;font-weight:700;color:#D0021B;text-transform:uppercase;letter-spacing:.5px}
.note-add-btn{display:flex;align-items:center;gap:4px;font-size:12px;color:#666;cursor:pointer;padding:4px 10px;border-radius:10px;border:1px solid #ddd;background:#fff}
.note-wrap{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee}
.note-row{display:flex;align-items:center;border-bottom:1px solid #f5f5f5}
.note-row:last-child{border-bottom:none}
.note-input{flex:1;font-size:14px;color:#111;padding:12px;background:transparent;border:none;outline:none;font-family:inherit}
.note-input.editing{background:#fffbf0}
.note-actions{display:flex;flex-shrink:0}
.icon-btn{width:40px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;color:#aaa;font-size:16px}
.icon-btn:active{opacity:.6}
.icon-btn.save{color:#1a7a3c}
.icon-btn.del{color:#aaa}
.new-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.new-input{flex:1;font-size:14px;padding:10px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#111;font-family:inherit;outline:none}
.new-input:focus{border-color:#D0021B}
.save-btn{padding:10px 14px;border-radius:10px;border:none;background:#D0021B;color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.cancel-btn{padding:10px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#888;font-size:13px;cursor:pointer}
.cl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cl-progress{font-size:12px;color:#888}
.cl-wrap{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;margin-bottom:8px}
.cl-row{display:flex;align-items:center;border-bottom:1px solid #f5f5f5}
.cl-row:last-child{border-bottom:none}
.cl-tap{padding:12px;cursor:pointer;flex-shrink:0}
.cl-box{width:20px;height:20px;border-radius:5px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center}
.cl-box.checked{background:#D0021B;border-color:#D0021B;color:#fff;font-size:12px;font-weight:700}
.cl-text{flex:1;font-size:14px;color:#111;padding:12px 4px;background:transparent;border:none;outline:none;font-family:inherit}
.cl-text.done{text-decoration:line-through;color:#aaa}
.cl-text.editing{background:#fffbf0;padding:12px 8px}
.cl-actions{display:flex;flex-shrink:0}
</style>

  dessert:[{name:"Parfaiteria beL",area:"Shinjuku · 12-15 min from hotel",desc:"Best late-night parfaits. 3PM–12AM.",tags:["Strawberry parfait","Pistachio parfait","Seasonal parfaits"]},{name:"Shinjuku Takano Fruits Parlor",area:"Shinjuku · 10 min from hotel",desc:"Luxury Japanese fruit parfaits. ~11AM–9PM.",tags:["Strawberry parfait","Melon parfait","Fruit sandwich"]},{name:"Honey Toast Cafe",area:"Shinjuku · 5-7 min from hotel",desc:"Giant honey toast desserts. Open until midnight.",tags:["Classic honey toast","Matcha honey toast","Ice cream topping"]},{name:"After All Coffee",area:"Shinjuku · 15 min from hotel",desc:"Famous Basque cheesecake. 9AM–11PM.",tags:["Basque cheesecake","Flat white","Café latte"]},{name:"Shiro-Hige's Cream Puff Factory",area:"Shimokitazawa (Day 6)",desc:"Totoro-themed cream puffs. Must visit!",tags:["Totoro shaped","Day 6"]},{name:"Cow Cow Kitchen",area:"Akihabara (Atre 1)",desc:"Highest-rated dessert shop in area. 10AM–9PM.",tags:["Milk Pie","Cream Puff","Seasonal Matcha Milk Pie"]}],
  ueno:[{name:"Gyukatsu Motomura",area:"Ueno · 5 min from station",desc:"Famous beef cutlet. 11AM–10PM.",tags:["Gyukatsu set","Onsen egg","Barley rice upgrade"]},{name:"Niku no Ohyama",area:"Ameyoko Market",desc:"Legendary menchi katsu. Most famous snack in Ameyoko.",tags:["Special Menchi Katsu","Wagyu Menchi","Croquette"]},{name:"Kurikoan",area:"Akihabara · 1 min from station",desc:"Freshly made taiyaki. Iconic street snack.",tags:["Taiyaki","Custard Taiyaki","Magikarp (seasonal)"]},{name:"Inshotei",area:"Inside Ueno Park",desc:"Traditional Japanese dining. 11AM–3PM / 5–9PM.",tags:["Hanakago lunch set","Tofu dishes","Seasonal set"]},{name:"SANDO LAB TOKYO",area:"Don Quijote Akihabara",desc:"Viral Tokyo sandwich shop. 10:30AM–10PM.",tags:["Double Egg Sando","Katsu Sando","Strawberry Dessert Sando"]}]
};

const konbiniData=[{store:"FamilyMart",cls:"fm",item:"Famichiki",why:"Famous Japanese fried chicken, best eaten hot"},{store:"7-Eleven",cls:"seven",item:"Tamago Sando",why:"Soft bread + creamy egg filling – viral Japan snack"},{store:"Lawson",cls:"lawson",item:"Premium Roll Cake",why:"Famous fresh cream dessert, popular late-night sweet"},{store:"Lawson",cls:"lawson",item:"Karaage-kun Chicken Bites",why:"Cult favorite fried chicken bites"},{store:"7-Eleven",cls:"seven",item:"Tuna Mayo Onigiri",why:"Classic Japanese rice ball snack"},{store:"Lawson",cls:"lawson",item:"Akuma Onigiri",why:"Savory rice ball with tempura flakes and dashi flavor"},{store:"Any",cls:"any",item:"Matcha Desserts",why:"Seasonal Japan-exclusive sweets"},{store:"7-Eleven",cls:"seven",item:"Ohayo Brûlée Ice Cream",why:"Viral crème brûlée-style ice cream"},{store:"Any",cls:"any",item:"Japanese KitKats",why:"Matcha, hojicha, strawberry, sakura flavors"},{store:"FamilyMart",cls:"fm",item:"Famima Socks",why:"Trending Japanese souvenir"},{store:"Lawson",cls:"lawson",item:"Butter Dorayaki",why:"Japanese pancake dessert with butter filling"},{store:"7-Eleven",cls:"seven",item:"Salad Chicken",why:"Healthy high-protein snack option"}];

const noteSections=[
  {key:"mustbuy",cat:"Must buy",items:["Matcha Cream","Wound Cream","Gokyujin Premium","Anessa Sunscreen"]},
  {key:"ramen",cat:"Ramen spots",items:["Hakata Furyu – Akihabara","Hakata Furyu – Shinjuku","Oreyu Shio Ramen – Shibuya Crossing","Menya Musashi Bukotsu Soden – Tsukemen"]},
  {key:"airport",cat:"Airport checklist",items:["Passport","Boarding pass / PAL booking","BDO JCB Platinum","RCBC JCB Platinum (backup)","Metrobank Travel Visa Signature","Power bank (carry-on only)","Visit Japan Web QR – screenshots"]},
];

let noteData={},addingNote={},editingNote={};
noteSections.forEach(s=>{noteData[s.key]=[...s.items];});

let checkItems=["Passport","Boarding pass / PAL booking","BDO JCB Platinum card","RCBC JCB Platinum (backup)","Metrobank Travel Visa Signature","Power bank (carry-on only)","Visit Japan Web QR – screenshots ready","Portable charger + cables","Comfortable walking shoes","Umbrella (rain backup)","Eco bag for shopping","Coins for gachapon / arcades","Water bottle","Light jacket (for Hakone/cool days)","Suica card (top up at airport)"];
let checkStates={},editingCheck={},addingCheck=false;

let expanded={},currentDay=0;

function showDay(idx){
  currentDay=idx;
  document.querySelectorAll('.day-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  const d=days[idx];
  let h=`<div class="day-header"><div class="day-badge">Day ${d.num}</div><div><div class="day-title">${d.title}</div><div class="day-sub">${d.date} · ${d.sub}</div></div></div><div class="timeline">`;
  d.items.forEach((item,i)=>{
    const open=expanded[idx+'-'+i]?'open':'';
    h+=`<div class="tl-item"><div class="tl-card" onclick="toggleExp(${idx},${i})"><div class="tl-time">${item.time}</div><div class="tl-act">${item.act}</div><div class="tl-transport">${item.t}</div><div class="tl-note ${open}">${item.note}</div></div></div>`;
  });
  h+='</div>';
  if(d.tips.length){h+='<div class="section-label">Tips for this day</div>';d.tips.forEach(t=>h+=`<div class="tip-card"><div class="tip-title">${t.title}</div><div class="tip-text">${t.text}</div></div>`);}
  h+='<div class="section-label">Day vibe</div><div class="vibe-grid">';
  Object.entries(d.vibe).forEach(([k,v])=>h+=`<div class="vibe-item"><div class="vibe-k">${k}</div><div class="vibe-v">${v}</div></div>`);
  h+='</div>';
  document.getElementById('dayContent').innerHTML=h;
}

function toggleExp(di,ii){expanded[di+'-'+ii]=!expanded[di+'-'+ii];showDay(di);}

function renderNotes(){
  let html='';
  noteSections.forEach(s=>{
    html+=`<div class="note-section"><div class="note-sec-header"><span class="note-cat">${s.cat}</span><button class="note-add-btn" onclick="startAdd('${s.key}')">+ Add</button></div><div class="note-wrap">`;
    noteData[s.key].forEach((item,i)=>{
      const isEd=editingNote[s.key+'_'+i];
      html+=`<div class="note-row"><input class="note-input${isEd?' editing':''}" value="${item.replace(/"/g,'&quot;')}" ${isEd?'':'readonly'} id="ni-${s.key}-${i}" onblur="saveNote('${s.key}',${i})"/>
      <div class="note-actions">`;
      if(isEd) html+=`<button class="icon-btn save" onclick="saveNote('${s.key}',${i})">✓</button>`;
      else html+=`<button class="icon-btn" onclick="editNote('${s.key}',${i})">✎</button>`;
      html+=`<button class="icon-btn del" onclick="deleteNote('${s.key}',${i})">✕</button></div></div>`;
    });
    html+='</div>';
    if(addingNote[s.key]) html+=`<div class="new-row"><input class="new-input" id="na-${s.key}" placeholder="Add a note..." onkeydown="if(event.key==='Enter')confirmAdd('${s.key}')"><button class="save-btn" onclick="confirmAdd('${s.key}')">Save</button><button class="cancel-btn" onclick="cancelAdd('${s.key}')">✕</button></div>`;
    html+='</div>';
  });
  document.getElementById('notesContainer').innerHTML=html;
  Object.keys(editingNote).forEach(k=>{if(editingNote[k]){const[sec,idx]=k.split('_');const el=document.getElementById('ni-'+sec+'-'+idx);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}});
  Object.keys(addingNote).forEach(k=>{if(addingNote[k]){const el=document.getElementById('na-'+k);if(el)el.focus();}});
}
function editNote(sec,idx){editingNote[sec+'_'+idx]=true;renderNotes();}
function saveNote(sec,idx){const el=document.getElementById('ni-'+sec+'-'+idx);if(el){const v=el.value.trim();if(v)noteData[sec][idx]=v;else noteData[sec].splice(idx,1);}delete editingNote[sec+'_'+idx];renderNotes();}
function deleteNote(sec,idx){noteData[sec].splice(idx,1);delete editingNote[sec+'_'+idx];renderNotes();}
function startAdd(sec){addingNote[sec]=true;renderNotes();}
function cancelAdd(sec){delete addingNote[sec];renderNotes();}
function confirmAdd(sec){const el=document.getElementById('na-'+sec);if(el&&el.value.trim())noteData[sec].push(el.value.trim());delete addingNote[sec];renderNotes();}

function renderChecklist(){
  const done=Object.values(checkStates).filter(Boolean).length;
  let h=`<div class="cl-header"><span class="section-label" style="margin:0">Packing list</span><span class="cl-progress">${done} / ${checkItems.length} packed</span></div><div class="cl-wrap">`;
  checkItems.forEach((item,i)=>{
    const isEd=editingCheck[i];
    const checked=checkStates[i]?'checked':'';
    const tc=(!isEd&&checkStates[i])?'done':'';
    h+=`<div class="cl-row"><div class="cl-tap" onclick="toggleCheck(${i})"><div class="cl-box ${checked}">${checkStates[i]?'✓':''}</div></div>
    <input class="cl-text ${tc}${isEd?' editing':''}" value="${item.replace(/"/g,'&quot;')}" ${isEd?'':'readonly'} id="ci-${i}" onblur="saveCheck(${i})" onkeydown="if(event.key==='Enter')saveCheck(${i})"/>
    <div class="cl-actions">`;
    if(isEd) h+=`<button class="icon-btn save" onclick="saveCheck(${i})">✓</button>`;
    else h+=`<button class="icon-btn" onclick="editCheck(${i})">✎</button>`;
    h+=`<button class="icon-btn del" onclick="deleteCheck(${i})">✕</button></div></div>`;
  });
  h+='</div>';
  if(addingCheck) h+=`<div class="new-row"><input class="new-input" id="ci-new" placeholder="Add item..." onkeydown="if(event.key==='Enter')confirmAddCheck()"><button class="save-btn" onclick="confirmAddCheck()">Save</button><button class="cancel-btn" onclick="cancelAddCheck()">✕</button></div>`;
  else h+=`<button class="note-add-btn" style="margin-top:8px" onclick="startAddCheck()">+ Add item</button>`;
  document.getElementById('checklistContainer').innerHTML=h;
  Object.keys(editingCheck).forEach(i=>{if(editingCheck[i]){const el=document.getElementById('ci-'+i);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}});
  if(addingCheck){const el=document.getElementById('ci-new');if(el)el.focus();}
}
function toggleCheck(i){checkStates[i]=!checkStates[i];renderChecklist();}
function editCheck(i){editingCheck[i]=true;renderChecklist();}
function saveCheck(i){const el=document.getElementById('ci-'+i);if(el){const v=el.value.trim();if(v)checkItems[i]=v;else{checkItems.splice(i,1);delete checkStates[i];}}delete editingCheck[i];renderChecklist();}
function deleteCheck(i){checkItems.splice(i,1);delete checkStates[i];delete editingCheck[i];renderChecklist();}
function startAddCheck(){addingCheck=true;renderChecklist();}
function cancelAddCheck(){addingCheck=false;renderChecklist();}
function confirmAddCheck(){const el=document.getElementById('ci-new');if(el&&el.value.trim())checkItems.push(el.value.trim());addingCheck=false;renderChecklist();}

function showFoodTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['ramen','curry','dessert','ueno'][i]===tab));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('food-'+tab).classList.add('active');
}

function showSection(id){
  ['days','food','konbini','notes','checklist'].forEach(s=>document.getElementById('section-'+s).style.display=s===id?'block':'none');
  document.querySelectorAll('#mainNav .nav-btn').forEach((b,i)=>b.classList.toggle('active',['days','food','konbini','notes','checklist'][i]===id));
}

const dn=document.getElementById('dayNav');
days.forEach((d,i)=>{const b=document.createElement('button');b.className='day-btn'+(i===0?' active':'');b.textContent='Day '+d.num;b.onclick=()=>showDay(i);dn.appendChild(b);});

Object.entries(foodData).forEach(([key,items])=>{
  document.getElementById('food-'+key).innerHTML=items.map(f=>`<div class="food-card"><div class="food-name">${f.name}</div><div class="food-area">${f.area}</div><div class="food-desc">${f.desc}</div><div class="food-tags">${f.tags.map(t=>`<span class="food-tag">${t}</span>`).join('')}</div></div>`).join('');
});

document.getElementById('konbiniList').innerHTML=konbiniData.map(k=>`<div class="konbini-card"><span class="k-store ${k.cls}">${k.store}</span><div><div class="k-item">${k.item}</div><div class="k-why">${k.why}</div></div></div>`).join('');

showDay(0);
renderNotes();
renderChecklist();
</script>
</body>
</html>
