    const ico=tIcons[item.transport]||'ti-point';
    const ex=expanded[idx+'-'+i]?'open':'';
    h+=`<div class="tl-item"><div class="tl-card" onclick="toggleExp(${idx},${i})"><div class="tl-time">${item.time}</div><div class="tl-act">${item.act}</div><div class="tl-transport"><i class="ti ${ico}" style="font-size:12px" aria-hidden="true"></i>${item.transport}</div><div class="exp ${ex}"><div class="exp-row"><span class="exp-label">Notes</span><span class="exp-val">${item.note}</span></div></div></div></div>`;
  });
  h+='</div>';
  if(d.tips.length){h+='<div class="section-label" style="margin-top:16px">Tips for this day</div>';d.tips.forEach(t=>h+=`<div class="tip-card"><div class="tip-title">${t.title}</div><div class="tip-text">${t.text}</div></div>`);}
  h+='<div class="section-label" style="margin-top:14px">Day vibe</div><div class="vibe-grid">';
  Object.entries(d.vibe).forEach(([k,v])=>h+=`<div class="vibe-item"><div class="vibe-k">${k.charAt(0).toUpperCase()+k.slice(1)}</div><div class="vibe-v">${v}</div></div>`);
  h+='</div>';
  document.getElementById('day-content').innerHTML=h;
}
function toggleExp(di,ii){expanded[di+'-'+ii]=!expanded[di+'-'+ii];showDay(di);}

const noteSections=[
  {key:'mustbuy',cat:'Must buy',items:['Matcha Cream','Wound Cream','Gokyujin Premium','Anessa Sunscreen']},
  {key:'ramen',cat:'Ramen spots',items:['Hakata Furyu – Akihabara','Hakata Furyu – Shinjuku','Oreyu Shio Ramen – Shibuya Crossing','Menya Musashi Bukotsu Soden – Tsukemen']},
  {key:'airport',cat:'Airport exit checklist',items:['Passport','Boarding pass / PAL booking','BDO JCB Platinum','RCBC JCB Platinum (backup)','Metrobank Travel Visa Signature','Power bank (carry-on only)','Visit Japan Web QR – keep screenshots']},
];
let noteData={},addingNote={},editingNote={};
function initNotes(){noteSections.forEach(s=>{noteData[s.key]=[...s.items];});}
function renderNotes(){
  let html='';
  noteSections.forEach(s=>{
    html+=`<div class="note-section"><div class="note-section-header"><span class="note-cat">${s.cat}</span><button class="note-add-btn" onclick="startAdd('${s.key}')"><i class="ti ti-plus" style="font-size:12px" aria-hidden="true"></i>Add</button></div><div class="note-card-wrap" id="notes-${s.key}">`;
    noteData[s.key].forEach((item,i)=>{
      const isEd=editingNote[s.key+'_'+i];
      html+=`<div class="note-row"><input class="note-row-text${isEd?' editing':''}" value="${item.replace(/"/g,'&quot;')}" ${isEd?'':'readonly'} id="note-input-${s.key}-${i}" onblur="saveNote('${s.key}',${i})"/><div class="note-row-actions">`;
      if(isEd) html+=`<button class="note-icon-btn save" onclick="saveNote('${s.key}',${i})" aria-label="Save"><i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i></button>`;
      else html+=`<button class="note-icon-btn" onclick="editNote('${s.key}',${i})" aria-label="Edit"><i class="ti ti-edit" style="font-size:13px" aria-hidden="true"></i></button>`;
      html+=`<button class="note-icon-btn del" onclick="deleteNote('${s.key}',${i})" aria-label="Delete"><i class="ti ti-trash" style="font-size:13px" aria-hidden="true"></i></button></div></div>`;
    });
    html+=`</div>`;
    if(addingNote[s.key]) html+=`<div class="new-note-row"><input class="new-note-input" id="new-input-${s.key}" placeholder="Add a note..." onkeydown="if(event.key==='Enter')confirmAdd('${s.key}')"><button class="new-note-save" onclick="confirmAdd('${s.key}')">Save</button><button class="new-note-cancel" onclick="cancelAdd('${s.key}')">Cancel</button></div>`;
    html+='</div>';
  });
  document.getElementById('notes-container').innerHTML=html;
  Object.keys(editingNote).forEach(k=>{if(editingNote[k]){const[sec,idx]=k.split('_');const el=document.getElementById('note-input-'+sec+'-'+idx);if(el){el.focus();const len=el.value.length;el.setSelectionRange(len,len);}}});
  Object.keys(addingNote).forEach(k=>{if(addingNote[k]){const el=document.getElementById('new-input-'+k);if(el)el.focus();}});
}
function editNote(sec,idx){editingNote[sec+'_'+idx]=true;renderNotes();}
function saveNote(sec,idx){const el=document.getElementById('note-input-'+sec+'-'+idx);if(el){const val=el.value.trim();if(val)noteData[sec][idx]=val;else noteData[sec].splice(idx,1);}delete editingNote[sec+'_'+idx];renderNotes();}
function deleteNote(sec,idx){noteData[sec].splice(idx,1);delete editingNote[sec+'_'+idx];renderNotes();}
function startAdd(sec){addingNote[sec]=true;renderNotes();}
function cancelAdd(sec){delete addingNote[sec];renderNotes();}
function confirmAdd(sec){const el=document.getElementById('new-input-'+sec);if(el&&el.value.trim())noteData[sec].push(el.value.trim());delete addingNote[sec];renderNotes();}

let checkItems=['Passport','Boarding pass / PAL booking','BDO JCB Platinum card','RCBC JCB Platinum (backup)','Metrobank Travel Visa Signature','Power bank (carry-on only)','Visit Japan Web QR – screenshots ready','Portable charger + cables','Comfortable walking shoes','Umbrella (rain backup)','Eco bag for shopping','Coins for gachapon / arcades','Water bottle','Light jacket (for Hakone/cool days)','Suica card (top up at airport)'];
let checkStates={},editingCheck={},addingCheck=false;

function renderChecklist(){
  const done=Object.values(checkStates).filter(Boolean).length;
  const total=checkItems.length;
  let html=`<div class="cl-header"><span class="section-label" style="margin:0">Packing list</span><span class="cl-progress">${done} / ${total} packed</span></div>`;
  html+='<div class="cl-wrap">';
  checkItems.forEach((item,i)=>{
    const isEd=editingCheck[i];
    const checked=checkStates[i]?'checked':'';
    const tc=(!isEd&&checkStates[i])?'done':'';
    html+=`<div class="cl-row">
      <div class="cl-check-area" onclick="toggleCheck(${i})"><div class="cl-check-box ${checked}"></div></div>
      <input class="cl-text-input ${tc}${isEd?' editing':''}" value="${item.replace(/"/g,'&quot;')}" ${isEd?'':'readonly'} id="cl-input-${i}" onblur="saveCheck(${i})" onkeydown="if(event.key==='Enter')saveCheck(${i})"/>
      <div class="cl-actions">`;
    if(isEd) html+=`<button class="note-icon-btn save" onclick="saveCheck(${i})" aria-label="Save"><i class="ti ti-check" style="font-size:14px" aria-hidden="true"></i></button>`;
    else html+=`<button class="note-icon-btn" onclick="editCheck(${i})" aria-label="Edit"><i class="ti ti-edit" style="font-size:13px" aria-hidden="true"></i></button>`;
    html+=`<button class="note-icon-btn del" onclick="deleteCheck(${i})" aria-label="Delete"><i class="ti ti-trash" style="font-size:13px" aria-hidden="true"></i></button>
      </div></div>`;
  });
  html+='</div>';
  if(addingCheck){
    html+=`<div class="new-note-row"><input class="new-note-input" id="new-check-input" placeholder="Add item..." onkeydown="if(event.key==='Enter')confirmAddCheck()"><button class="new-note-save" onclick="confirmAddCheck()">Save</button><button class="new-note-cancel" onclick="cancelAddCheck()">Cancel</button></div>`;
  } else {
    html+=`<button class="note-add-btn" style="margin-top:8px" onclick="startAddCheck()"><i class="ti ti-plus" style="font-size:12px" aria-hidden="true"></i>Add item</button>`;
  }
  document.getElementById('checklist-container').innerHTML=html;
  Object.keys(editingCheck).forEach(i=>{if(editingCheck[i]){const el=document.getElementById('cl-input-'+i);if(el){el.focus();const len=el.value.length;el.setSelectionRange(len,len);}}});
  if(addingCheck){const el=document.getElementById('new-check-input');if(el)el.focus();}
}
function toggleCheck(i){checkStates[i]=!checkStates[i];renderChecklist();}
function editCheck(i){editingCheck[i]=true;renderChecklist();}
function saveCheck(i){const el=document.getElementById('cl-input-'+i);if(el){const val=el.value.trim();if(val)checkItems[i]=val;else{checkItems.splice(i,1);delete checkStates[i];}}delete editingCheck[i];renderChecklist();}
function deleteCheck(i){checkItems.splice(i,1);delete checkStates[i];delete editingCheck[i];renderChecklist();}
function startAddCheck(){addingCheck=true;renderChecklist();}
function cancelAddCheck(){addingCheck=false;renderChecklist();}
function confirmAddCheck(){const el=document.getElementById('new-check-input');if(el&&el.value.trim())checkItems.push(el.value.trim());addingCheck=false;renderChecklist();}
